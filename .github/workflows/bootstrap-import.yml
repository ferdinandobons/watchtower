name: Bootstrap source import

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/bootstrap-import.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: watchtower-bootstrap-import
  cancel-in-progress: false

jobs:
  import-source:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reassemble and verify source archive
        shell: bash
        run: |
          set -euo pipefail
          cat .watchtower-source-*.b64 | base64 --decode > /tmp/watchtower-source.tar.xz
          echo "07e1e13390e1064c6fd1d9f977ab2f6a0067a9319204b8f8e0652764b318cffb  /tmp/watchtower-source.tar.xz" | sha256sum --check --strict
          mkdir -p /tmp/watchtower-source
          tar -xJf /tmp/watchtower-source.tar.xz -C /tmp/watchtower-source

      - name: Replace bootstrap tree with Watchtower source
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/watchtower-source/. .
          chmod +x scripts/smoke-test.sh
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "feat: bootstrap local-first Watchtower MVP"
          git push origin HEAD:main
